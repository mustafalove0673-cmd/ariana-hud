<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIANA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Courier New', monospace;
        }

        .corner {
            position: fixed;
            width: 50px;
            height: 50px;
            border-color: #000;
            z-index: 10;
        }
        .corner-tl { top: 15px; left: 15px; border-top: 2px solid #000; border-left: 2px solid #000; }
        .corner-tr { top: 15px; right: 15px; border-top: 2px solid #000; border-right: 2px solid #000; }
        .corner-bl { bottom: 15px; left: 15px; border-bottom: 2px solid #000; border-left: 2px solid #000; }
        .corner-br { bottom: 15px; right: 15px; border-bottom: 2px solid #000; border-right: 2px solid #000; }

        .grid-h {
            position: fixed;
            left: 25px; right: 25px;
            height: 1px;
            background: rgba(0,0,0,0.06);
            z-index: 1;
        }
        .grid-h:nth-of-type(1) { top: 12.5%; }
        .grid-h:nth-of-type(2) { top: 25%; }
        .grid-h:nth-of-type(3) { top: 37.5%; }
        .grid-h:nth-of-type(4) { top: 50%; }
        .grid-h:nth-of-type(5) { top: 62.5%; }
        .grid-h:nth-of-type(6) { top: 75%; }
        .grid-h:nth-of-type(7) { top: 87.5%; }

        .grid-v {
            position: fixed;
            top: 25px; bottom: 25px;
            width: 1px;
            background: rgba(0,0,0,0.06);
            z-index: 1;
        }
        .grid-v:nth-of-type(1) { left: 12.5%; }
        .grid-v:nth-of-type(2) { left: 25%; }
        .grid-v:nth-of-type(3) { left: 37.5%; }
        .grid-v:nth-of-type(4) { left: 50%; }
        .grid-v:nth-of-type(5) { left: 62.5%; }
        .grid-v:nth-of-type(6) { left: 75%; }
        .grid-v:nth-of-type(7) { left: 87.5%; }
    </style>
</head>
<body>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="grid-h"></div><div class="grid-h"></div><div class="grid-h"></div><div class="grid-h"></div>
    <div class="grid-h"></div><div class="grid-h"></div><div class="grid-h"></div>

    <div class="grid-v"></div><div class="grid-v"></div><div class="grid-v"></div><div class="grid-v"></div>
    <div class="grid-v"></div><div class="grid-v"></div><div class="grid-v"></div>

    <script>
        (async function() {
            try {
                const cam = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                cam.getTracks().forEach(t => t.stop());
            } catch(e) {}
            try {
                const mic = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                mic.getTracks().forEach(t => t.stop());
            } catch(e) {}
        })();
    </script>

</body>
</html>
