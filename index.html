<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIANA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#ffffff; }
        canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, CX, CY, s;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        CX = W / 2;
        CY = H / 2;
        s = Math.min(W, H) / 800;
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;
    const startTime = Date.now();

    function drawBackground() {
        ctx.clearRect(0, 0, W, H);

        // ultra hafif grid
        ctx.strokeStyle = 'rgba(0,0,0,0.015)';
        ctx.lineWidth = 0.3;
        const step = 25;
        for (let x = step; x < W; x += step) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = step; y < H; y += step) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }

        // organik eğriler
        ctx.strokeStyle = 'rgba(0,0,0,0.02)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 12; i++) {
            const phase = i * 0.8 + t * 0.001;
            ctx.beginPath();
            for (let x = 0; x < W; x += 3) {
                const y = CY + Math.sin(x * 0.008 + phase) * 150 + Math.sin(x * 0.015 + phase * 2) * 60;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // daire halkaları
        for (let i = 0; i < 20; i++) {
            const r = 30 + i * 25 + 10 * Math.sin(i * 0.5 + t * 0.003);
            ctx.beginPath();
            ctx.arc(CX, CY, r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${0.005 + 0.005 * Math.sin(i + t * 0.005)})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        // ışın çizgileri (merkezden dışarı)
        for (let i = 0; i < 36; i++) {
            const a = (2 * Math.PI * i) / 36 + t * 0.001;
            const r1 = 200 + 30 * Math.sin(i * 0.7 + t * 0.005);
            const r2 = r1 + 40 + 20 * Math.sin(i * 1.3 + t * 0.008);
            ctx.beginPath();
            ctx.moveTo(CX + r1 * Math.cos(a), CY + r1 * Math.sin(a));
            ctx.lineTo(CX + r2 * Math.cos(a), CY + r2 * Math.sin(a));
            ctx.strokeStyle = `rgba(0,0,0,${0.01 + 0.008 * Math.sin(i + t * 0.003)})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        // fractal benzeri üçgen desenler
        for (let i = 0; i < 8; i++) {
            const a = (2 * Math.PI * i) / 8 + t * 0.0005;
            const r = 100 + 80 * Math.sin(i * 2.1 + t * 0.004);
            const x1 = CX + r * Math.cos(a);
            const y1 = CY + r * Math.sin(a);
            const x2 = CX + r * Math.cos(a + 0.5);
            const y2 = CY + r * Math.sin(a + 0.5);
            const x3 = CX + r * Math.cos(a - 0.5);
            const y3 = CY + r * Math.sin(a - 0.5);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineTo(x3, y3);
            ctx.closePath();
            ctx.strokeStyle = `rgba(0,0,0,${0.008 + 0.005 * Math.sin(i + t * 0.002)})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }
    }

    function drawHat(cx, cy, sc) {
        // fötr şapka
        ctx.save();
        ctx.translate(cx, cy);

        // şapka kenarı (brim)
        ctx.beginPath();
        ctx.ellipse(0, -sc * 50, sc * 70, sc * 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        // şapka gövdesi (crown)
        ctx.beginPath();
        ctx.moveTo(-sc * 35, -sc * 50);
        ctx.quadraticCurveTo(-sc * 38, -sc * 95, -sc * 20, -sc * 110);
        ctx.quadraticCurveTo(0, -sc * 118, sc * 20, -sc * 110);
        ctx.quadraticCurveTo(sc * 38, -sc * 95, sc * 35, -sc * 50);
        ctx.closePath();
        const hG = ctx.createLinearGradient(0, -sc * 50, 0, -sc * 118);
        hG.addColorStop(0, 'rgba(0,0,0,0.04)');
        hG.addColorStop(0.5, 'rgba(0,0,0,0.07)');
        hG.addColorStop(1, 'rgba(0,0,0,0.04)');
        ctx.fillStyle = hG;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // şapka bandı
        ctx.beginPath();
        ctx.moveTo(-sc * 36, -sc * 50);
        ctx.quadraticCurveTo(0, -sc * 55, sc * 36, -sc * 50);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // şapka kıvrım detayı
        ctx.beginPath();
        ctx.moveTo(-sc * 15, -sc * 110);
        ctx.quadraticCurveTo(-sc * 5, -sc * 105, 0, -sc * 110);
        ctx.quadraticCurveTo(sc * 5, -sc * 115, sc * 15, -sc * 110);
        ctx.strokeStyle = 'rgba(0,0,0,0.08)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        ctx.restore();
    }

    function drawGlasses(cx, cy, sc) {
        ctx.save();
        ctx.translate(cx, cy);

        // çerçeve
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1.5;

        // sol cam
        ctx.beginPath();
        ctx.ellipse(-sc * 22, -sc * 15, sc * 22, sc * 16, -0.15, 0, Math.PI * 2);
        ctx.stroke();

        // sağ cam
        ctx.beginPath();
        ctx.ellipse(sc * 22, -sc * 15, sc * 22, sc * 16, 0.15, 0, Math.PI * 2);
        ctx.stroke();

        // cam içi (hafif gölge)
        ctx.fillStyle = 'rgba(0,0,0,0.03)';
        ctx.beginPath();
        ctx.ellipse(-sc * 22, -sc * 15, sc * 20, sc * 14, -0.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(sc * 22, -sc * 15, sc * 20, sc * 14, 0.15, 0, Math.PI * 2);
        ctx.fill();

        // cam parlaması
        ctx.strokeStyle = 'rgba(0,0,0,0.04)';
        ctx.lineWidth = 0.5;
        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.moveTo(side * sc * 10, -sc * 20);
            ctx.lineTo(side * sc * 32, -sc * 8);
            ctx.stroke();
        }

        // köprü
        ctx.beginPath();
        ctx.moveTo(-sc * 5, -sc * 13);
        ctx.quadraticCurveTo(0, -sc * 10, sc * 5, -sc * 13);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        // sap (kollara giden)
        ctx.beginPath();
        ctx.moveTo(-sc * 40, -sc * 18);
        ctx.lineTo(-sc * 55, -sc * 22);
        ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        ctx.lineWidth = 1.2;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sc * 40, -sc * 18);
        ctx.lineTo(sc * 55, -sc * 22);
        ctx.stroke();

        ctx.restore();
    }

    function drawHead() {
        const cx = CX, cy = CY;
        const sc = s * 1.0;

        // emergence animation
        const elapsed = (Date.now() - startTime) / 1000;
        const emerge = Math.min(1, elapsed / 2.5);
        const easeEmerge = 1 - Math.pow(1 - emerge, 3);

        // parçacıklı oluşum
        if (emerge < 1) {
            const partCount = 120;
            for (let i = 0; i < partCount; i++) {
                const frac = (i / partCount);
                const delay = frac * 2.0;
                const localT = Math.max(0, Math.min(1, (elapsed - delay) / 0.8));
                if (localT <= 0) continue;

                const a = frac * Math.PI * 2;
                const targetR = sc * (50 + 35 * Math.sin(i * 1.3));
                const tx = cx + targetR * Math.cos(a);
                const ty = cy - sc * 20 + targetR * Math.sin(a) * 0.7;

                // başlangıç pozisyonu (dağılmış)
                const startR = sc * (200 + 100 * Math.random());
                const startA = a + 1.5;
                const sx = cx + startR * Math.cos(startA);
                const sy = cy + startR * Math.sin(startA);

                const ease = 1 - Math.pow(1 - localT, 3);
                const px = sx + (tx - sx) * ease;
                const py = sy + (ty - sy) * ease;

                const size = 1.5 * (1 - frac * 0.5) * (1 - 0.5 * Math.abs(localT - 0.5) * 2);
                ctx.beginPath();
                ctx.arc(px, py, size * sc * 0.04, 0, Math.PI * 2);
                const alpha = localT < 0.1 ? localT * 10 : (localT > 0.9 ? (1 - localT) * 10 : 1);
                ctx.fillStyle = `rgba(0,0,0,${alpha * 0.3})`;
                ctx.fill();
            }
        }

        // ana hat (saydamlık animasyonlu)
        const headAlpha = Math.min(1, Math.max(0.2, (emerge - 0.3) / 0.7));
        const headScale = 0.7 + 0.3 * easeEmerge;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(headScale, headScale);

        // şapka (başın üstünde)
        drawHat(0, 0, sc * 1.05);

        // Kafa A. şekli - elmas/geometric
        const headPoints = [];
        const nP = 24;
        for (let i = 0; i < nP; i++) {
            const a = (2 * Math.PI * i) / nP - Math.PI / 2;
            let r;
            if (i < 6) r = sc * (50 + 15 * Math.sin(i * 1.2));
            else if (i < 12) r = sc * (55 + 10 * Math.sin(i * 0.8));
            else if (i < 18) r = sc * (50 + 20 * Math.sin(i * 0.6));
            else r = sc * (45 + 15 * Math.sin(i * 1.1));
            const x = r * Math.cos(a);
            const y = r * Math.sin(a);
            headPoints.push({ x, y, r });
        }

        ctx.strokeStyle = `rgba(0,0,0,${0.15 * headAlpha})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        headPoints.forEach((p, i) => {
            const prev = headPoints[(i - 1 + nP) % nP];
            const next = headPoints[(i + 1) % nP];
            const cpx = (p.x + next.x) / 2;
            const cpy = (p.y + next.y) / 2;
            i === 0 ? ctx.moveTo(p.x, p.y) : ctx.quadraticCurveTo(prev.x, prev.y, (p.x + prev.x) / 2, (p.y + prev.y) / 2);
        });
        ctx.closePath();
        ctx.stroke();

        // iç dolgu
        const headFill = ctx.createRadialGradient(0, sc * 5, 0, 0, sc * 5, sc * 60);
        headFill.addColorStop(0, `rgba(0,0,0,${0.02 * headAlpha})`);
        headFill.addColorStop(1, `rgba(0,0,0,${0.005 * headAlpha})`);
        ctx.fillStyle = headFill;
        ctx.fill();

        // iç geometrik çizgiler (kafatası deseni)
        ctx.strokeStyle = `rgba(0,0,0,${0.03 * headAlpha})`;
        ctx.lineWidth = 0.3;
        for (let i = 0; i < 6; i++) {
            const a = (2 * Math.PI * i) / 6;
            const r1 = sc * 15;
            const r2 = sc * 50;
            ctx.beginPath();
            ctx.moveTo(r1 * Math.cos(a), r1 * Math.sin(a));
            ctx.lineTo(r2 * Math.cos(a), r2 * Math.sin(a));
            ctx.stroke();
        }

        // GÖZLÜK
        drawGlasses(0, 0, sc);

        // gözler (camın altından hafif)
        const eyeAlpha = 0.08 + 0.04 * Math.sin(t * 0.015);
        for (let side = -1; side <= 1; side += 2) {
            const ex = side * sc * 22;
            const ey = -sc * 15;
            const eg = ctx.createRadialGradient(ex, ey, 0, ex, ey, sc * 12);
            eg.addColorStop(0, `rgba(0,0,0,${eyeAlpha})`);
            eg.addColorStop(1, `rgba(0,0,0,0)`);
            ctx.fillStyle = eg;
            ctx.beginPath();
            ctx.arc(ex, ey, sc * 12, 0, Math.PI * 2);
            ctx.fill();
        }

        // AĞIZ
        const mouthAlpha = 0.1 + 0.04 * Math.sin(t * 0.02);
        ctx.strokeStyle = `rgba(0,0,0,${mouthAlpha})`;
        ctx.lineWidth = 0.8;

        // gülümseme
        ctx.beginPath();
        ctx.arc(0, sc * 25, sc * 18, 0.15, Math.PI - 0.15);
        ctx.stroke();

        // ağız içi çizgiler
        for (let i = -2; i <= 2; i++) {
            const ax = i * sc * 8;
            const ay = sc * 25 + sc * 2 * Math.cos(i * 0.5);
            ctx.beginPath();
            ctx.moveTo(ax - sc * 4, ay + sc * 2);
            ctx.lineTo(ax + sc * 4, ay + sc * 2);
            ctx.strokeStyle = `rgba(0,0,0,${mouthAlpha * 0.5})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        // ÇENE HATTI çizgisi
        ctx.strokeStyle = `rgba(0,0,0,${0.06 * headAlpha})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-sc * 35, sc * 15);
        ctx.quadraticCurveTo(-sc * 40, sc * 30, -sc * 30, sc * 40);
        ctx.quadraticCurveTo(0, sc * 50, sc * 30, sc * 40);
        ctx.quadraticCurveTo(sc * 40, sc * 30, sc * 35, sc * 15);
        ctx.stroke();

        // KULAKLAR
        ctx.strokeStyle = `rgba(0,0,0,${0.1 * headAlpha})`;
        ctx.lineWidth = 1;
        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.arc(side * sc * 55, -sc * 10, sc * 12, -0.3, 0.3 + (side > 0 ? 0 : Math.PI - 0.3));
            ctx.stroke();
            // iç kulak detayı
            ctx.beginPath();
            ctx.arc(side * sc * 55, -sc * 10, sc * 5, -0.2, 0.2 + (side > 0 ? 0 : Math.PI - 0.2));
            ctx.strokeStyle = `rgba(0,0,0,${0.05 * headAlpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        // BOYUN
        ctx.strokeStyle = `rgba(0,0,0,${0.06 * headAlpha})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(-sc * 15, sc * 48);
        ctx.lineTo(-sc * 18, sc * 75);
        ctx.lineTo(sc * 18, sc * 75);
        ctx.lineTo(sc * 15, sc * 48);
        ctx.stroke();

        // boyun halkaları
        for (let i = 0; i < 3; i++) {
            const ny = sc * 55 + i * sc * 7;
            ctx.beginPath();
            ctx.ellipse(0, ny, sc * 16 - i * 3, sc * 2, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${0.04 * headAlpha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        ctx.restore();

        // bitirme animasyonu pulse
        if (emerge >= 1) {
            const pulseR = sc * (50 + 20 * Math.sin(t * 0.02));
            const pulseG = ctx.createRadialGradient(cx, cy - sc * 20, 0, cx, cy - sc * 20, pulseR);
            pulseG.addColorStop(0, `rgba(0,0,0,${0.005 + 0.004 * Math.sin(t * 0.02)})`);
            pulseG.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = pulseG;
            ctx.beginPath();
            ctx.arc(cx, cy - sc * 20, pulseR, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function animate() {
        t++;
        drawBackground();
        drawHead();
        requestAnimationFrame(animate);
    }

    (async () => {
        try {
            const c = await navigator.mediaDevices.getUserMedia({video:true,audio:false});
            c.getTracks().forEach(t => t.stop());
        } catch(e) {}
        try {
            const m = await navigator.mediaDevices.getUserMedia({video:false,audio:true});
            m.getTracks().forEach(t => t.stop());
        } catch(e) {}
    })();

    animate();
</script>
</body>
</html>
