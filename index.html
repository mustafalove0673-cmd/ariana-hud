<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIANA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#0a0a0f; font-family:'Courier New',monospace; }
        canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }

        .top-bar { position:fixed; top:0; left:0; right:0; height:36px; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:0 20px; pointer-events:none; }
        .top-bar .l { font-size:10px; color:rgba(255,255,255,0.15); letter-spacing:3px; text-transform:uppercase; }
        .top-bar .r { font-size:10px; color:rgba(255,255,255,0.12); letter-spacing:2px; }

        .bottom-bar { position:fixed; bottom:0; left:0; right:0; height:44px; z-index:10; display:flex; align-items:center; justify-content:center; gap:28px; pointer-events:none; }
        .bottom-bar span { font-size:8px; color:rgba(255,255,255,0.1); letter-spacing:3px; text-transform:uppercase; }
        .bottom-bar .dot { color:rgba(100,180,255,0.3); }
    </style>
</head>
<body>

<div class="top-bar">
    <span class="l">ARIANA</span>
    <span class="r" id="clock">00:00</span>
</div>

<div class="bottom-bar">
    <span>sys</span><span class="dot">◆</span>
    <span>com</span><span class="dot">◆</span>
    <span>nav</span><span class="dot">◆</span>
    <span>pwr</span><span class="dot">◆</span>
    <span>sec</span>
</div>

<canvas id="c"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let W, H, CX, CY, sc;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        CX = W / 2;
        CY = H / 2;
        sc = Math.min(W, H) / 900;
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;

    function drawBG() {
        const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, H * 0.7);
        grad.addColorStop(0, '#12121e');
        grad.addColorStop(0.4, '#0a0a12');
        grad.addColorStop(1, '#030308');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        for (let i = 0; i < 120; i++) {
            const x = (i * 137.5 + t * 0.02) % W;
            const y = (i * 97.3 + t * 0.015) % H;
            ctx.beginPath();
            ctx.arc(x, y, 0.3 + 0.3 * Math.sin(i + t * 0.01), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100,180,255,${0.02 + 0.02 * Math.sin(i * 0.5 + t * 0.005)})`;
            ctx.fill();
        }
    }

    function drawGrid() {
        ctx.strokeStyle = 'rgba(100,180,255,0.03)';
        ctx.lineWidth = 0.5;
        const step = 40;
        for (let x = step; x < W; x += step) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
            ctx.stroke();
        }
        for (let y = step; y < H; y += step) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
            ctx.stroke();
        }
    }

    function drawHumanFigure() {
        const s = sc * 220;
        const cx = CX, cy = CY + s * 0.15;
        const pulse = 1 + 0.005 * Math.sin(t * 0.02);

        // outer glow
        const glow = ctx.createRadialGradient(cx, cy - s * 0.4, 0, cx, cy - s * 0.4, s * 1.2);
        glow.addColorStop(0, 'rgba(60,140,255,0.03)');
        glow.addColorStop(0.5, 'rgba(40,100,220,0.02)');
        glow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy - s * 0.2, s * 1.2, 0, Math.PI * 2);
        ctx.fill();

        // scan line
        const scanY = cy - s * 0.9 + (t * 0.6 % (s * 1.8));
        const grad = ctx.createLinearGradient(0, scanY - 5, 0, scanY + 5);
        grad.addColorStop(0, 'rgba(60,180,255,0)');
        grad.addColorStop(0.5, `rgba(60,180,255,${0.03 + 0.02 * Math.sin(t * 0.05)})`);
        grad.addColorStop(1, 'rgba(60,180,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(cx - s * 0.5, scanY - 5, s, 10);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(pulse, pulse);

        const alpha = 0.12 + 0.03 * Math.sin(t * 0.015);

        // head
        ctx.beginPath();
        ctx.arc(0, -s * 0.7, s * 0.18, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(100,200,255,${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // head inner glow
        const headG = ctx.createRadialGradient(0, -s * 0.7, 0, 0, -s * 0.7, s * 0.18);
        headG.addColorStop(0, `rgba(80,180,255,${alpha * 0.3})`);
        headG.addColorStop(1, `rgba(80,180,255,0)`);
        ctx.fillStyle = headG;
        ctx.beginPath();
        ctx.arc(0, -s * 0.7, s * 0.18, 0, Math.PI * 2);
        ctx.fill();

        // face details - eyes
        const eyeY = -s * 0.72;
        const eyeSpacing = s * 0.07;
        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.arc(side * eyeSpacing, eyeY, s * 0.025, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100,200,255,${alpha * 1.2})`;
            ctx.fill();
        }

        // neck
        ctx.beginPath();
        ctx.moveTo(-s * 0.05, -s * 0.52);
        ctx.lineTo(-s * 0.04, -s * 0.42);
        ctx.lineTo(s * 0.04, -s * 0.42);
        ctx.lineTo(s * 0.05, -s * 0.52);
        ctx.closePath();
        ctx.strokeStyle = `rgba(100,200,255,${alpha * 0.8})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // torso
        ctx.beginPath();
        ctx.moveTo(-s * 0.2, -s * 0.4);
        ctx.quadraticCurveTo(-s * 0.25, -s * 0.1, -s * 0.18, s * 0.1);
        ctx.lineTo(-s * 0.15, s * 0.1);
        ctx.quadraticCurveTo(-s * 0.12, -s * 0.05, -s * 0.08, -s * 0.35);
        ctx.lineTo(s * 0.08, -s * 0.35);
        ctx.quadraticCurveTo(s * 0.12, -s * 0.05, s * 0.15, s * 0.1);
        ctx.lineTo(s * 0.18, s * 0.1);
        ctx.quadraticCurveTo(s * 0.25, -s * 0.1, s * 0.2, -s * 0.4);
        ctx.closePath();
        ctx.strokeStyle = `rgba(100,200,255,${alpha * 0.9})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        ctx.fillStyle = `rgba(60,160,255,${alpha * 0.08})`;
        ctx.fill();

        // chest arc (holographic)
        ctx.beginPath();
        ctx.arc(0, -s * 0.1, s * 0.2, -0.5, 0.5);
        ctx.strokeStyle = `rgba(100,200,255,${alpha * 0.5})`;
        ctx.lineWidth = 0.5;
        ctx.setLineDash([2, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        // left arm
        ctx.beginPath();
        ctx.moveTo(-s * 0.2, -s * 0.35);
        ctx.quadraticCurveTo(-s * 0.35, -s * 0.2, -s * 0.3, s * 0.05);
        ctx.quadraticCurveTo(-s * 0.28, s * 0.15, -s * 0.25, s * 0.25);
        ctx.strokeStyle = `rgba(100,200,255,${alpha * 0.8})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();

        // right arm
        ctx.beginPath();
        ctx.moveTo(s * 0.2, -s * 0.35);
        ctx.quadraticCurveTo(s * 0.35, -s * 0.2, s * 0.3, s * 0.05);
        ctx.quadraticCurveTo(s * 0.28, s * 0.15, s * 0.25, s * 0.25);
        ctx.stroke();

        // left leg
        ctx.beginPath();
        ctx.moveTo(-s * 0.1, s * 0.1);
        ctx.quadraticCurveTo(-s * 0.15, s * 0.35, -s * 0.12, s * 0.6);
        ctx.quadraticCurveTo(-s * 0.1, s * 0.7, -s * 0.08, s * 0.8);
        ctx.stroke();

        // right leg
        ctx.beginPath();
        ctx.moveTo(s * 0.1, s * 0.1);
        ctx.quadraticCurveTo(s * 0.15, s * 0.35, s * 0.12, s * 0.6);
        ctx.quadraticCurveTo(s * 0.1, s * 0.7, s * 0.08, s * 0.8);
        ctx.stroke();

        // measurement rings around body
        for (let i = 0; i < 5; i++) {
            const ringY = -s * 0.5 + i * s * 0.28;
            const ringW = s * (0.25 + i * 0.06);
            const ringAlpha = alpha * (0.3 + 0.1 * Math.sin(t * 0.01 + i * 2));
            ctx.beginPath();
            ctx.ellipse(0, ringY, ringW, s * 0.02, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(100,200,255,${ringAlpha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        // floating data dots around body
        for (let i = 0; i < 20; i++) {
            const a = (2 * Math.PI * i) / 20 + t * 0.003;
            const r = s * (0.35 + 0.1 * Math.sin(i * 1.5 + t * 0.01));
            const dx = r * Math.cos(a);
            const dy = -s * 0.1 + r * Math.sin(a) * 0.6;
            ctx.beginPath();
            ctx.arc(dx, dy, 0.8 + 0.5 * Math.sin(t * 0.02 + i), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100,200,255,${alpha * 0.5 + 0.3 * Math.sin(t * 0.01 + i) * 0.5})`;
            ctx.fill();
        }

        ctx.restore();
    }

    function drawRadarArc() {
        const a = (t * 0.008) % (Math.PI * 2);
        const r = Math.min(W, H) * 0.45;

        ctx.beginPath();
        ctx.arc(CX, CY, r, a - 0.15, a);
        ctx.strokeStyle = `rgba(60,160,255,${0.02 + 0.01 * Math.sin(t * 0.02)})`;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX + r * Math.cos(a), CY + r * Math.sin(a));
        ctx.strokeStyle = 'rgba(60,160,255,0.015)';
        ctx.lineWidth = 0.5;
        ctx.stroke();
    }

    function animate() {
        t++;
        drawBG();
        drawGrid();
        drawRadarArc();
        drawHumanFigure();

        requestAnimationFrame(animate);
    }

    function updateClock() {
        const d = new Date();
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        document.getElementById('clock').textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 1000);

    (async () => {
        try {
            const cam = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            cam.getTracks().forEach(t => t.stop());
        } catch(e) {}
        try {
            const mic = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            mic.getTracks().forEach(t => t.stop());
        } catch(e) {}
    })();

    animate();
</script>
</body>
</html>
