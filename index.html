<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIANA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#ffffff; }
        canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, CX, CY, s;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        CX = W / 2;
        CY = H / 2;
        s = Math.min(W, H) / 800;
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;
    const startTime = Date.now();

    function drawBG() {
        ctx.clearRect(0,0,W,H);

        // grid
        ctx.strokeStyle = 'rgba(0,0,0,0.06)';
        ctx.lineWidth = 0.5;
        for (let x = 25; x < W; x += 25) {
            ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
        }
        for (let y = 25; y < H; y += 25) {
            ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
        }

        // daire halkaları
        for (let i = 0; i < 30; i++) {
            const r = 15 + i * 20 + 5 * Math.sin(i * 0.7 + t * 0.003);
            const a = i < 10 ? 0.12 : (i < 20 ? 0.08 : 0.04);
            ctx.beginPath();
            ctx.arc(CX, CY, r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${a * (1 - i/40)})`;
            ctx.lineWidth = 0.4 + 0.2 * Math.sin(i * 0.5);
            ctx.stroke();
        }

        // spiral
        ctx.beginPath();
        for (let a = 0; a < Math.PI * 16; a += 0.03) {
            const r = 3 + a * 14;
            const x = CX + r * Math.cos(a + t * 0.002);
            const y = CY + r * Math.sin(a + t * 0.002);
            a === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.strokeStyle = 'rgba(0,0,0,0.06)';
        ctx.lineWidth = 0.5;
        ctx.stroke();

        // mandala yaprakları
        for (let ring = 0; ring < 5; ring++) {
            const n = 6 + ring * 4;
            const br = 70 + ring * 55;
            const pl = 25 + ring * 12;
            const dir = ring % 2 ? 1 : -1;
            for (let i = 0; i < n; i++) {
                const a = (2 * Math.PI * i) / n + t * 0.002 * dir;
                const x1 = CX + br * Math.cos(a);
                const y1 = CY + br * Math.sin(a);
                const x2 = CX + (br + pl) * Math.cos(a);
                const y2 = CY + (br + pl) * Math.sin(a);
                const cpx = CX + (br + pl*0.5) * Math.cos(a) - pl*0.35 * Math.sin(a);
                const cpy = CY + (br + pl*0.5) * Math.sin(a) + pl*0.35 * Math.cos(a);
                const cpx2 = CX + (br + pl*0.5) * Math.cos(a) + pl*0.35 * Math.sin(a);
                const cpy2 = CY + (br + pl*0.5) * Math.sin(a) - pl*0.35 * Math.cos(a);
                ctx.beginPath();
                ctx.moveTo(x1,y1);
                ctx.quadraticCurveTo(cpx, cpy, x2, y2);
                ctx.quadraticCurveTo(cpx2, cpy2, x1, y1);
                ctx.strokeStyle = `rgba(0,0,0,${0.04 + 0.03 * (1 - ring/5)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }

        // ışınlar
        for (let i = 0; i < 48; i++) {
            const a = (2 * Math.PI * i) / 48 + t * 0.001;
            const r1 = 180 + 30 * Math.sin(i * 2.3 + t * 0.005);
            const r2 = r1 + 25 + 15 * Math.sin(i * 1.7 + t * 0.008);
            ctx.beginPath();
            ctx.moveTo(CX + r1 * Math.cos(a), CY + r1 * Math.sin(a));
            ctx.lineTo(CX + r2 * Math.cos(a), CY + r2 * Math.sin(a));
            ctx.strokeStyle = `rgba(0,0,0,${0.03 + 0.02 * Math.sin(i + t * 0.003)})`;
            ctx.lineWidth = 0.3 + 0.2 * Math.sin(i * 0.5);
            ctx.stroke();
        }

        // fractal ağaç dalları
        function drawBranch(x, y, len, angle, depth) {
            if (depth > 4 || len < 2) return;
            const ex = x + len * Math.cos(angle);
            const ey = y + len * Math.sin(angle);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(ex, ey);
            ctx.strokeStyle = `rgba(0,0,0,${0.05 * (1 - depth/5)})`;
            ctx.lineWidth = 0.4 * (1 - depth/5);
            ctx.stroke();
            const sw = 0.35 + 0.1 * Math.sin(depth + t * 0.004);
            drawBranch(ex, ey, len * 0.68, angle - sw, depth + 1);
            drawBranch(ex, ey, len * 0.68, angle + sw, depth + 1);
        }
        for (let d = 0; d < 4; d++) {
            drawBranch(CX, CY, 100 + 20 * Math.sin(d + t * 0.003), (Math.PI/2)*d + 0.15 * Math.sin(t*0.002+d), 0);
        }

        // nokta bulutu
        for (let i = 0; i < 150; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = 20 + Math.random() * 350;
            ctx.beginPath();
            ctx.arc(CX + r * Math.cos(a), CY + r * Math.sin(a), 0.5 + Math.random() * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0,${0.03 + 0.04 * Math.random()})`;
            ctx.fill();
        }

        // bağlantı ağı
        const nodes = [];
        for (let i = 0; i < 20; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = 50 + Math.random() * 280;
            nodes.push({ x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) });
        }
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i+1; j < nodes.length; j++) {
                const dx = nodes[i].x - nodes[j].x;
                const dy = nodes[i].y - nodes[j].y;
                const d = Math.sqrt(dx*dx + dy*dy);
                if (d < 100) {
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[j].x, nodes[j].y);
                    ctx.strokeStyle = `rgba(0,0,0,${0.015 * (1 - d/100)})`;
                    ctx.lineWidth = 0.3;
                    ctx.stroke();
                }
            }
            ctx.beginPath();
            ctx.arc(nodes[i].x, nodes[i].y, 1.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.04)';
            ctx.fill();
        }

        // sembol halkaları
        const chars = '+-*/=<>&%#$@!~[]{}()|;:,._';
        for (let ring = 0; ring < 6; ring++) {
            const r = 90 + ring * 40 + 8 * Math.sin(ring + t * 0.003);
            const n = 16 + ring * 8;
            for (let i = 0; i < n; i++) {
                const a = (2 * Math.PI * i) / n + t * 0.001 * (ring % 2 ? 1 : -1);
                ctx.fillStyle = `rgba(0,0,0,${0.015 + 0.01 * Math.sin(i + ring + t * 0.004)})`;
                ctx.font = `${5 + ring * 0.5}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(chars[(i + ring * 3) % chars.length], CX + r * Math.cos(a), CY + r * Math.sin(a));
            }
        }

        // dalga halkaları
        for (let i = 0; i < 5; i++) {
            const phase = i * 0.7 + t * 0.005;
            const r = (20 + i * 45) * (1 + 0.2 * Math.sin(phase));
            ctx.beginPath();
            ctx.arc(CX, CY, r % 400, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${0.015 + 0.01 * (1 - Math.abs(Math.sin(phase)))})`;
            ctx.lineWidth = 0.4;
            ctx.stroke();
        }
    }

    function drawHat(cx, cy, sc) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.beginPath();
        ctx.ellipse(0, -sc * 48, sc * 68, sc * 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.06)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-sc * 34, -sc * 48);
        ctx.quadraticCurveTo(-sc * 38, -sc * 92, -sc * 20, -sc * 108);
        ctx.quadraticCurveTo(0, -sc * 116, sc * 20, -sc * 108);
        ctx.quadraticCurveTo(sc * 38, -sc * 92, sc * 34, -sc * 48);
        ctx.closePath();
        const hG = ctx.createLinearGradient(0, -sc*48, 0, -sc*116);
        hG.addColorStop(0, 'rgba(0,0,0,0.04)');
        hG.addColorStop(0.5, 'rgba(0,0,0,0.09)');
        hG.addColorStop(1, 'rgba(0,0,0,0.04)');
        ctx.fillStyle = hG;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-sc * 35, -sc * 48);
        ctx.quadraticCurveTo(0, -sc * 54, sc * 35, -sc * 48);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(-sc * 5, -sc * 54, sc * 10, sc * 7);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(-sc * 5, -sc * 54, sc * 10, sc * 7);
        ctx.beginPath();
        ctx.arc(0, -sc * 50.5, sc * 1.8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,0,0,0.1)';
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-sc * 10, -sc * 108);
        ctx.quadraticCurveTo(0, -sc * 104, sc * 10, -sc * 108);
        ctx.strokeStyle = 'rgba(0,0,0,0.08)';
        ctx.lineWidth = 0.4;
        ctx.stroke();
        ctx.restore();
    }

    function drawGlasses(cx, cy, sc) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 1.8;
        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.ellipse(side * sc * 22, -sc * 14, sc * 22, sc * 16, side * 0.15, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(0,0,0,0.03)';
            ctx.fill();
        }

        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.moveTo(side * sc * 10, -sc * 22);
            ctx.quadraticCurveTo(side * sc * 22, -sc * 16, side * sc * 32, -sc * 6);
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.moveTo(-sc * 5, -sc * 12);
        ctx.quadraticCurveTo(0, -sc * 8, sc * 5, -sc * 12);
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.lineWidth = 1.3;
        ctx.stroke();

        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.moveTo(side * sc * 40, -sc * 18);
            ctx.quadraticCurveTo(side * sc * 52, -sc * 20, side * sc * 58, -sc * 26);
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1.2;
            ctx.stroke();
        }
        ctx.restore();
    }

    function drawHead() {
        const cx = CX, cy = CY;
        const sc = s * 0.95;
        const elapsed = (Date.now() - startTime) / 1000;
        const emerge = Math.min(1, elapsed / 3);
        const ee = 1 - Math.pow(1 - emerge, 3);
        const ha = Math.min(1, Math.max(0.1, (emerge - 0.2) / 0.8));

        if (emerge < 1) {
            for (let i = 0; i < 150; i++) {
                const f = i / 150;
                const del = f * 2.5;
                const lt = Math.max(0, Math.min(1, (elapsed - del) / 0.6));
                if (lt <= 0) continue;
                const a = f * Math.PI * 2 + Math.sin(i * 3.7) * 0.5;
                const tr = sc * (30 + 50 * Math.sin(i * 1.7));
                const tx = cx + tr * Math.cos(a);
                const ty = cy - sc * 20 + tr * Math.sin(a) * 0.6;
                const sr = sc * (180 + 120 * Math.random());
                const sa = a + 1.2 + 0.5 * Math.random();
                const sx = cx + sr * Math.cos(sa);
                const sy = cy + sr * Math.sin(sa);
                const ease = 1 - Math.pow(1 - lt, 3);
                const px = sx + (tx - sx) * ease;
                const py = sy + (ty - sy) * ease;
                const sz = 1.5 * (1 - f * 0.6) * (1 - 0.5 * Math.abs(lt - 0.5) * 2);
                ctx.beginPath();
                ctx.arc(px, py, sz * sc * 0.05, 0, Math.PI * 2);
                const al = lt < 0.1 ? lt * 10 : (lt > 0.9 ? (1 - lt) * 10 : 1);
                ctx.fillStyle = `rgba(0,0,0,${al * 0.4})`;
                ctx.fill();
            }
        }

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(0.6 + 0.4 * ee, 0.6 + 0.4 * ee);

        drawHat(0, 0, sc);

        const pts = [];
        const np = 28;
        for (let i = 0; i < np; i++) {
            const a = (2 * Math.PI * i) / np - Math.PI / 2;
            let r;
            if (i < 5) r = sc * (48 + 18 * Math.sin(i * 1.5));
            else if (i < 10) r = sc * (50 + 12 * Math.sin(i * 0.9));
            else if (i < 18) r = sc * (52 + 22 * Math.sin(i * 0.5));
            else if (i < 24) r = sc * (48 + 16 * Math.sin(i * 1.1));
            else r = sc * (42 + 20 * Math.sin(i * 1.3));
            pts.push({ x: r * Math.cos(a), y: r * Math.sin(a) });
        }

        ctx.strokeStyle = `rgba(0,0,0,${0.25 * ha})`;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        for (let i = 0; i <= np; i++) {
            const p = pts[i % np];
            const pn = pts[(i + 1) % np];
            const cpx = (p.x + pn.x) / 2;
            const cpy = (p.y + pn.y) / 2;
            i === 0 ? ctx.moveTo(p.x, p.y) : ctx.quadraticCurveTo(p.x, p.y, cpx, cpy);
        }
        ctx.stroke();

        for (let i = 0; i < 8; i++) {
            const a = (2 * Math.PI * i) / 8;
            ctx.beginPath();
            ctx.moveTo(sc * 10 * Math.cos(a), sc * 10 * Math.sin(a));
            ctx.lineTo(sc * 50 * Math.cos(a), sc * 50 * Math.sin(a));
            ctx.strokeStyle = `rgba(0,0,0,${0.04 * ha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        for (let i = 0; i < 4; i++) {
            const r = sc * (22 + i * 10);
            ctx.beginPath();
            ctx.arc(0, sc * 3, r, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${0.03 * ha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        drawGlasses(0, 0, sc);

        for (let side = -1; side <= 1; side += 2) {
            const eg = ctx.createRadialGradient(side*sc*22, -sc*14, 0, side*sc*22, -sc*14, sc*14);
            eg.addColorStop(0, `rgba(0,0,0,${0.1 + 0.06 * Math.sin(t*0.015)})`);
            eg.addColorStop(1, `rgba(0,0,0,0)`);
            ctx.fillStyle = eg;
            ctx.beginPath();
            ctx.arc(side*sc*22, -sc*14, sc*14, 0, Math.PI*2);
            ctx.fill();
        }

        const ma = 0.12 + 0.05 * Math.sin(t * 0.02);
        ctx.strokeStyle = `rgba(0,0,0,${ma})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, sc * 26, sc * 18, 0.1, Math.PI - 0.1);
        ctx.stroke();

        for (let i = -3; i <= 3; i++) {
            const ax = i * sc * 6;
            const ay = sc * 26 + sc * 1.5 * (1 - Math.abs(i) * 0.15);
            ctx.beginPath();
            ctx.moveTo(ax - sc * 3, ay);
            ctx.lineTo(ax + sc * 3, ay);
            ctx.strokeStyle = `rgba(0,0,0,${ma * 0.5})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        ctx.strokeStyle = `rgba(0,0,0,${0.08 * ha})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(-sc * 35, sc * 16);
        ctx.quadraticCurveTo(-sc * 42, sc * 33, -sc * 30, sc * 43);
        ctx.quadraticCurveTo(0, sc * 52, sc * 30, sc * 43);
        ctx.quadraticCurveTo(sc * 42, sc * 33, sc * 35, sc * 16);
        ctx.stroke();

        ctx.strokeStyle = `rgba(0,0,0,${0.1 * ha})`;
        ctx.lineWidth = 1.2;
        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.moveTo(side * sc * 8, -sc * 32);
            ctx.quadraticCurveTo(side * sc * 24, -sc * 36, side * sc * 36, -sc * 30);
            ctx.stroke();
        }

        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            ctx.moveTo(side * sc * 24, sc * 4);
            ctx.quadraticCurveTo(side * sc * 40, sc * 6, side * sc * 46, sc * 18);
            ctx.strokeStyle = `rgba(0,0,0,${0.04 * ha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        ctx.strokeStyle = `rgba(0,0,0,${0.15 * ha})`;
        ctx.lineWidth = 1.2;
        for (let side = -1; side <= 1; side += 2) {
            ctx.beginPath();
            const s = side > 0 ? 1 : 0;
            ctx.arc(side * sc * 54, -sc * 10, sc * 12, -0.4 + Math.PI * 0.5 * s, 0.4 + Math.PI * (0.5 + 0.5 * s));
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(side * sc * 54, -sc * 10, sc * 5, -0.3 + Math.PI * 0.5 * s, 0.3 + Math.PI * (0.5 + 0.5 * s));
            ctx.strokeStyle = `rgba(0,0,0,${0.06 * ha})`;
            ctx.lineWidth = 0.4;
            ctx.stroke();
        }

        ctx.strokeStyle = `rgba(0,0,0,${0.08 * ha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-sc * 15, sc * 50);
        ctx.lineTo(-sc * 18, sc * 78);
        ctx.lineTo(sc * 18, sc * 78);
        ctx.lineTo(sc * 15, sc * 50);
        ctx.stroke();

        for (let i = 0; i < 4; i++) {
            const ny = sc * 55 + i * sc * 6;
            ctx.beginPath();
            ctx.ellipse(0, ny, sc * 16 - i * 3, sc * 1.5, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${0.04 * ha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        ctx.restore();
    }

    function animate() {
        t++;
        drawBG();
        drawHead();
        requestAnimationFrame(animate);
    }

    (async () => {
        try { const c = await navigator.mediaDevices.getUserMedia({video:true,audio:false}); c.getTracks().forEach(t=>t.stop()); } catch(e) {}
        try { const m = await navigator.mediaDevices.getUserMedia({video:false,audio:true}); m.getTracks().forEach(t=>t.stop()); } catch(e) {}
    })();

    animate();
</script>
</body>
</html>
