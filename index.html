<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARIANA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { width:100%; height:100%; overflow:hidden; background:#fff; }
        canvas { display:block; position:fixed; top:0; left:0; width:100%; height:100%; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, CX, CY;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        CX = W / 2;
        CY = H / 2;
        initLines();
        initTunnel();
        initFlow();
    }
    resize();
    window.addEventListener('resize', resize);

    let t = 0;

    // ---- 3D TUNNEL LINES (perspective zoom) ----
    let tunnelLines = [];
    function initTunnel() {
        tunnelLines = [];
        for (let i = 0; i < 80; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = 50 + Math.random() * 300;
            tunnelLines.push({
                angle: a,
                radius: r,
                speed: 0.5 + Math.random() * 1.5,
                z: Math.random() * 1000,
                length: 200 + Math.random() * 400,
                width: 0.3 + Math.random() * 0.5
            });
        }
    }

    function drawTunnel() {
        const fov = 400;
        for (const l of tunnelLines) {
            l.z -= l.speed * 3;
            if (l.z < -l.length) l.z += 1000 + l.length;

            const z1 = l.z;
            const z2 = l.z + l.length;

            const scale1 = fov / (fov + z1);
            const scale2 = fov / (fov + z2);

            const x1 = CX + l.radius * Math.cos(l.angle) * scale1;
            const y1 = CY + l.radius * Math.sin(l.angle) * scale1;
            const x2 = CX + l.radius * Math.cos(l.angle) * scale2;
            const y2 = CY + l.radius * Math.sin(l.angle) * scale2;

            const alpha = Math.max(0, Math.min(0.15, (1 - z1 / 1000) * 0.15));

            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
            ctx.lineWidth = l.width * (1 + scale1 * 0.5);
            ctx.stroke();
        }
    }

    // ---- FLOW LINES (organic moving curves) ----
    let flowLines = [];
    function initFlow() {
        flowLines = [];
        for (let i = 0; i < 30; i++) {
            const pts = [];
            const startX = Math.random() * W;
            const startY = Math.random() * H;
            for (let j = 0; j < 40; j++) {
                pts.push({
                    x: startX + (Math.random() - 0.5) * 200,
                    y: startY + (Math.random() - 0.5) * 200
                });
            }
            flowLines.push({
                points: pts,
                speed: 0.2 + Math.random() * 0.5,
                offset: Math.random() * 1000,
                width: 0.3 + Math.random() * 0.6
            });
        }
    }

    function drawFlow() {
        for (const fl of flowLines) {
            ctx.beginPath();
            const pts = fl.points;
            for (let i = 0; i < pts.length; i++) {
                const p = pts[i];
                const dx = Math.sin(i * 0.2 + t * fl.speed * 0.01 + fl.offset) * 30;
                const dy = Math.cos(i * 0.15 + t * fl.speed * 0.008 + fl.offset * 1.3) * 30;
                const x = p.x + dx;
                const y = p.y + dy;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgba(0,0,0,${0.015 + 0.01 * Math.sin(t * 0.005 + fl.offset)})`;
            ctx.lineWidth = fl.width;
            ctx.stroke();
        }
    }

    // ---- 3D GRID (perspective zoom) ----
    let gridLines3D = [];
    function initLines() {
        gridLines3D = [];
        for (let i = 0; i < 40; i++) {
            gridLines3D.push({
                x: (Math.random() - 0.5) * W * 2,
                z: Math.random() * 1500,
                speed: 0.5 + Math.random() * 2
            });
        }
    }

    function draw3DGrid() {
        const fov = 500;
        const camZ = t * 2;

        // horizontal lines
        for (let y = -5; y <= 5; y++) {
            ctx.beginPath();
            let started = false;
            for (let x = -30; x <= 30; x++) {
                const wx = x * 30;
                const wy = y * 30;
                const wz = -500 + (camZ % 1000);

                const scale = fov / (fov + wz);
                const sx = CX + wx * scale;
                const sy = CY + wy * scale;

                if (scale > 0 && sx > -100 && sx < W + 100 && sy > -100 && sy < H + 100) {
                    if (!started) { ctx.moveTo(sx, sy); started = true; }
                    else ctx.lineTo(sx, sy);
                } else started = false;
            }
            const alpha = Math.max(0, Math.min(0.04, 0.04 * (1 - Math.abs(y) / 6)));
            ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        // vertical lines
        for (let x = -30; x <= 30; x++) {
            ctx.beginPath();
            let started = false;
            for (let y = -5; y <= 5; y++) {
                const wx = x * 30;
                const wy = y * 30;
                const wz = -500 + (camZ % 1000);

                const scale = fov / (fov + wz);
                const sx = CX + wx * scale;
                const sy = CY + wy * scale;

                if (scale > 0 && sx > -100 && sx < W + 100 && sy > -100 && sy < H + 100) {
                    if (!started) { ctx.moveTo(sx, sy); started = true; }
                    else ctx.lineTo(sx, sy);
                } else started = false;
            }
            const alpha = Math.max(0, Math.min(0.04, 0.04 * (1 - Math.abs(x) / 32)));
            ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        // diagonal perspective lines to vanishing point
        for (let i = -12; i <= 12; i += 2) {
            const angle = (i / 12) * Math.PI * 0.45;
            ctx.beginPath();
            const len = 800;
            const sx = CX + len * Math.sin(angle);
            const sy = CY - len * Math.cos(angle);
            const ex = CX;
            const ey = CY;
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.strokeStyle = `rgba(0,0,0,${0.01 + 0.01 * (1 - Math.abs(i) / 12)})`;
            ctx.lineWidth = 0.2;
            ctx.stroke();
        }
    }

    // ---- PARTICLE SYSTEM (orbiting, scale pulsing) ----
    let particles3D = [];
    function initParticles3D() {
        particles3D = [];
        for (let i = 0; i < 60; i++) {
            particles3D.push({
                angle: Math.random() * Math.PI * 2,
                radius: 50 + Math.random() * 300,
                z: Math.random() * 800 - 400,
                speed: 0.002 + Math.random() * 0.005,
                size: 0.5 + Math.random() * 1.5,
                phase: Math.random() * Math.PI * 2
            });
        }
    }
    initParticles3D();

    function drawParticles3D() {
        const fov = 500;
        for (const p of particles3D) {
            p.angle += p.speed;
            const x = p.radius * Math.cos(p.angle);
            const y = p.radius * Math.sin(p.angle) * 0.5;
            const z = p.z + 200 * Math.sin(t * 0.005 + p.phase);

            const scale = fov / (fov + z);
            if (scale <= 0) continue;

            const sx = CX + x * scale;
            const sy = CY + y * scale;
            const sz = p.size * scale * 0.8;
            const alpha = Math.max(0, Math.min(0.08, (1 - Math.abs(z) / 600) * 0.08));

            ctx.beginPath();
            ctx.arc(sx, sy, sz, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,0,0,${alpha})`;
            ctx.fill();
        }
    }

    // ---- MORPHING RINGS (scale effect) ----
    function drawMorphRings() {
        for (let i = 0; i < 12; i++) {
            const phase = i * 0.3 + t * 0.004;
            const r = 40 * (1 + 0.3 * Math.sin(phase)) + i * 30;
            const squeeze = 1 + 0.2 * Math.sin(phase * 0.7);
            const alpha = 0.008 + 0.006 * (1 - i / 12) * (0.5 + 0.5 * Math.sin(phase));

            ctx.beginPath();
            ctx.ellipse(CX, CY, r, r * squeeze * 0.25, 0, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
            ctx.lineWidth = 0.4 + 0.2 * (1 - i / 12);
            ctx.stroke();
        }
    }

    // ---- WAVE GRID (undulating surface) ----
    function drawWaveGrid() {
        const cols = 20;
        const rows = 15;
        const cellW = W / cols;
        const cellH = H / rows;

        for (let r = 0; r <= rows; r++) {
            ctx.beginPath();
            for (let c = 0; c <= cols; c++) {
                const x = c * cellW;
                const y = r * cellH + Math.sin(c * 0.5 + t * 0.008) * 8 + Math.sin(r * 0.3 + t * 0.006) * 8;
                c === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgba(0,0,0,${0.012 + 0.008 * Math.sin(r + t * 0.004)})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }

        for (let c = 0; c <= cols; c++) {
            ctx.beginPath();
            for (let r = 0; r <= rows; r++) {
                const x = c * cellW + Math.sin(r * 0.5 + t * 0.007) * 8 + Math.sin(c * 0.3 + t * 0.005) * 8;
                const y = r * cellH;
                r === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgba(0,0,0,${0.012 + 0.008 * Math.sin(c + t * 0.004)})`;
            ctx.lineWidth = 0.3;
            ctx.stroke();
        }
    }

    function animate() {
        t++;
        ctx.clearRect(0, 0, W, H);

        // Layer 1: Wave Grid (farthest back)
        drawWaveGrid();

        // Layer 2: Flow Lines
        drawFlow();

        // Layer 3: 3D Grid
        draw3DGrid();

        // Layer 4: Morphing Rings
        drawMorphRings();

        // Layer 5: 3D Tunnel
        drawTunnel();

        // Layer 6: 3D Particles
        drawParticles3D();

        requestAnimationFrame(animate);
    }

    (async () => {
        try { const c = await navigator.mediaDevices.getUserMedia({video:true,audio:false}); c.getTracks().forEach(t=>t.stop()); } catch(e) {}
        try { const m = await navigator.mediaDevices.getUserMedia({video:false,audio:true}); m.getTracks().forEach(t=>t.stop()); } catch(e) {}
    })();

    animate();
</script>
</body>
</html>
